    <title>Запрошення на розпис</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body,
        html {
            background: #E9E4DE !important;
        }

        body.is-loading {
            overflow: hidden;
        }

        .invitation {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            line-height: 0;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.45s ease;
        }

        body.is-loading .invitation {
            opacity: 0;
            visibility: hidden;
        }

        .invitation__image {
            display: block;
            width: 100%;
            height: auto;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .invitation__image.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loader {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: grid;
            place-items: center;
            background: #E9E4DE !important;
            opacity: 1;
            visibility: visible;
            transition: opacity 0.45s ease, visibility 0.45s ease;
        }

        body.is-ready .loader {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader svg {
            display: block;
            width: 100%;
            height: auto;
            max-width: 350px;
        }
    </style>
</head>
